name: Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: debian

    steps:
      - name: Checkout repository
        uses: https://github.com/actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 8
        uses: https://github.com/actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

  deploy:
    runs-on: adb-usb
    needs: build

    steps:
      - name: Checkout repository
        uses: https://github.com/actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 8
        uses: https://github.com/actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Check ADB devices
        run: |
          adb devices
          adb devices | grep -w "device" | grep -v "List" || { echo "ERROR: No device connected"; exit 1; }

      - name: Install APK on device
        run: |
          adb install -r app/build/outputs/apk/debug/app-debug.apk
          echo "Deployed app-debug.apk to device"

      - name: Verify installation
        run: |
          adb shell pm list packages | grep forrestguice.suntimeswidget && echo "Package installed successfully" || echo "Package not found"
